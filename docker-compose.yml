services:
  product-service:
    build:
      context: .
      dockerfile: src/ProductService/ProductService.Api/Dockerfile
    ports:
      - "5102:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=marketplacehub;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  amazon-connector:
    build:
      context: .
      dockerfile: src/AmazonConnector/Dockerfile
    environment:
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - AmazonApi__BaseUrl=http://mock-amazon-api:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      mock-amazon-api:
        condition: service_started

  mock-amazon-api:
    build:
      context: .
      dockerfile: src/MockAmazonApi/Dockerfile
    ports:
      - "5200:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=marketplacehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-dashboard:
    build:
      context: src/ProductsDashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - product-service

volumes:
  postgres_data:
